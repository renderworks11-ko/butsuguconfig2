<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>仏具配置シミュレーター</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            padding: 20px;
        }

        .stage {
            position: relative;
            width: 700px; 
            height: 700px;
            background-color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .butsudan {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .gusoku-layer {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: none; /* 基本は非表示 */
            pointer-events: none;
        }

        .active {
            display: block; /* activeクラスがついたものだけ表示 */
        }

        /* 後段の位置調整 */
        .back-set {
            bottom: 35%; 
            width: 120px;
            z-index: 10;
            transform: translateX(-50%) scale(0.9);
            filter: brightness(0.9);
        }

        /* 前段の位置調整 */
        .front-set {
            bottom: 31%; 
            width: 150px;
            z-index: 20;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            border: 1px solid #ccc;
            background: #fff;
        }

        button.selected {
            background-color: #333;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="stage">
        <img src="butsu22.jpg" class="butsudan">

        <img src="blue_back.png" id="blue-back" class="gusoku-layer back-set active">
        <img src="blue_front.png" id="blue-front" class="gusoku-layer front-set active">

        <img src="pink_back.png" id="pink-back" class="gusoku-layer back-set">
        <img src="pink_front.png" id="pink-front" class="gusoku-layer front-set">
    </div>

    <div class="controls">
        <button id="btn-blue" class="selected" onclick="changeSet('blue')">ブルー</button>
        <button id="btn-pink" onclick="changeSet('pink')">ピンク</button>
    </div>

    <script>
        function changeSet(color) {
            // 全画像を一旦消す
            document.querySelectorAll('.gusoku-layer').forEach(img => img.classList.remove('active'));
            // ボタンの選択状態を解除
            document.querySelectorAll('button').forEach(btn => btn.classList.remove('selected'));

            // 選んだ色を表示
            document.getElementById(color + '-front').classList.add('active');
            document.getElementById(color + '-back').classList.add('active');
            // ボタンを黒くする
            document.getElementById('btn-' + color).classList.add('selected');
        }
    </script>

</body>
</html>
